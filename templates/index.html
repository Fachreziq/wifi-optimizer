<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Coverage Optimizer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-lg-3 sidebar">

            <h2 class="logo">
                📶 WiFi Optimizer
            </h2>

            <hr>

            <div class="mb-3">
                <label class="form-label">Panjang Gedung</label>
                <input type="number"
                       id="width"
                       class="form-control"
                       value="20">
            </div>

            <div class="mb-3">
                <label class="form-label">Lebar Gedung</label>
                <input type="number"
                       id="height"
                       class="form-control"
                       value="20">
            </div>

            <div class="mb-3">
                <label class="form-label">Jumlah Router</label>
                <input type="number"
                       id="routers"
                       class="form-control"
                       value="3">
            </div>

            <div class="mb-3">
                <label class="form-label">Radius Sinyal</label>
                <input type="number"
                       id="radius"
                       class="form-control"
                       value="5">
            </div>

            <div class="mb-3">
                <label class="form-label">Algoritma</label>

                <select id="algorithm"
                        class="form-select">

                    <option>Hill Climbing</option>
                    <option>Simulated Annealing</option>
                    <option>Genetic Algorithm</option>

                </select>
            </div>

            <button
                class="btn btn-primary w-100 mb-2"
                onclick="optimize()">

                Optimasi

            </button>

            <button
                class="btn btn-success w-100"
                onclick="compareAlgorithms()">

                Bandingkan Semua Algoritma

            </button>

        </div>

        <!-- Content -->
        <div class="col-lg-9 content">

            <h1 class="page-title">
                Dashboard Optimasi Penempatan Titik WiFi
            </h1>

            <!-- Statistik -->
            <div class="row mt-4">

                <div class="col-md-4">

                    <div class="stat-card">

                        <h6>Coverage</h6>

                        <h2 id="coverage">
                            -
                        </h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card">

                        <h6>Execution Time</h6>

                        <h2 id="executionTime">
                            -
                        </h2>

                    </div>

                </div>

                <div class="col-md-4">

                    <div class="stat-card">

                        <h6>Algoritma</h6>

                        <h2 id="algoName">
                            -
                        </h2>

                    </div>

                </div>

            </div>

            <!-- Canvas -->
            <div class="card shadow mt-4">

                <div class="card-body">

                    <h4>
                        Visualisasi Gedung
                    </h4>

                    <canvas
                        id="wifiCanvas"
                        width="900"
                        height="500">
                    </canvas>

                </div>

            </div>

            <!-- Posisi Router -->
            <div class="card shadow mt-4">

                <div class="card-body">

                    <h4>
                        Posisi Router
                    </h4>

                    <ul id="routerList">

                    </ul>

                </div>

            </div>

            <!-- Tabel Perbandingan -->
            <div class="card shadow mt-4">

                <div class="card-body">

                    <h4>
                        Perbandingan Algoritma
                    </h4>

                    <div class="table-responsive">

                        <table class="table table-striped">

                            <thead>

                                <tr>
                                    <th>Algoritma</th>
                                    <th>Coverage (%)</th>
                                    <th>Execution Time (s)</th>
                                </tr>

                            </thead>

                            <tbody id="comparisonBody">

                            </tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
